# NXP i.MX 平台命令模板
# 适用芯片：i.MX6ULL/6Q, i.MX7, i.MX8M Mini/Nano/Plus, i.MX93
# 典型系统：Yocto, Debian, Ubuntu, Buildroot
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # 系统基础
    sys_uname:
      template: "uname -a"
      description: "sys_uname 命令"
      when_to_use: "按需执行 sys_uname 场景"
      args: []
      examples: []
      risk: "low"
    sys_uptime:
      template: "uptime"
      description: "sys_uptime 命令"
      when_to_use: "按需执行 sys_uptime 场景"
      args: []
      examples: []
      risk: "low"
    sys_os_release:
      template: "cat /etc/os-release"
      description: "sys_os_release 命令"
      when_to_use: "按需执行 sys_os_release 场景"
      args: []
      examples: []
      risk: "low"
    sys_cpu_info:
      template: "cat /proc/cpuinfo"
      description: "sys_cpu_info 命令"
      when_to_use: "按需执行 sys_cpu_info 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_usage:
      template: "free -m"
      description: "sys_mem_usage 命令"
      when_to_use: "按需执行 sys_mem_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_disk_usage:
      template: "df -h"
      description: "sys_disk_usage 命令"
      when_to_use: "按需执行 sys_disk_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_dmesg_tail:
      template: "dmesg | tail -n {0}"
      description: "sys_dmesg_tail 命令"
      when_to_use: "按需执行 sys_dmesg_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_dmesg_grep:
      template: "dmesg | grep {0}"
      description: "sys_dmesg_grep 命令"
      when_to_use: "按需执行 sys_dmesg_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    soc_model:
      template: "cat /proc/device-tree/model"
      description: "soc_model 命令"
      when_to_use: "按需执行 soc_model 场景"
      args: []
      examples: []
      risk: "low"
    soc_compatible:
      template: "cat /proc/device-tree/compatible | tr '\\0' '\\n'"
      description: "soc_compatible 命令"
      when_to_use: "按需执行 soc_compatible 场景"
      args: []
      examples: []
      risk: "low"

    # 温度
    temp_all:
      template: "paste /sys/class/thermal/thermal_zone*/type /sys/class/thermal/thermal_zone*/temp"
      description: "temp_all 命令"
      when_to_use: "按需执行 temp_all 场景"
      args: []
      examples: []
      risk: "low"
    temp_cpu:
      template: "cat /sys/class/thermal/thermal_zone0/temp"
      description: "temp_cpu 命令"
      when_to_use: "按需执行 temp_cpu 场景"
      args: []
      examples: []
      risk: "low"

    # CPU 调频
    cpu_freq_cur:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      description: "cpu_freq_cur 命令"
      when_to_use: "按需执行 cpu_freq_cur 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_max:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq"
      description: "cpu_freq_max 命令"
      when_to_use: "按需执行 cpu_freq_max 场景"
      args: []
      examples: []
      risk: "low"
    cpu_governor:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
      description: "cpu_governor 命令"
      when_to_use: "按需执行 cpu_governor 场景"
      args: []
      examples: []
      risk: "low"
    cpu_set_governor:
      template: "echo {0} > /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
      description: "cpu_set_governor 命令"
      when_to_use: "按需执行 cpu_set_governor 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # NXP 专有：NPU（i.MX8M Plus）
    npu_info:
      template: "lsmod | grep -E 'galcore|imx8m'"
      description: "npu_info 命令"
      when_to_use: "按需执行 npu_info 场景"
      args: []
      examples: []
      risk: "low"
    npu_devices:
      template: "ls /dev/galcore /dev/vsi_nn*"
      description: "npu_devices 命令"
      when_to_use: "按需执行 npu_devices 场景"
      args: []
      examples: []
      risk: "low"

    # 视频编解码 VPU/GPU
    vpu_info:
      template: "dmesg | grep -i vpu"
      description: "vpu_info 命令"
      when_to_use: "按需执行 vpu_info 场景"
      args: []
      examples: []
      risk: "low"
    gpu_info:
      template: "dmesg | grep -i -E 'gpu|galcore|etnaviv'"
      description: "gpu_info 命令"
      when_to_use: "按需执行 gpu_info 场景"
      args: []
      examples: []
      risk: "low"

    # 存储
    storage_list:
      template: "ls -l /dev/mmcblk* /dev/sd*"
      description: "storage_list 命令"
      when_to_use: "按需执行 storage_list 场景"
      args: []
      examples: []
      risk: "low"
    emmc_cid:
      template: "cat /sys/class/block/mmcblk0/device/cid"
      description: "emmc_cid 命令"
      when_to_use: "按需执行 emmc_cid 场景"
      args: []
      examples: []
      risk: "low"
    emmc_name:
      template: "cat /sys/class/block/mmcblk0/device/name"
      description: "emmc_name 命令"
      when_to_use: "按需执行 emmc_name 场景"
      args: []
      examples: []
      risk: "low"
    flash_partitions:
      template: "cat /proc/mtd"
      description: "flash_partitions 命令"
      when_to_use: "按需执行 flash_partitions 场景"
      args: []
      examples: []
      risk: "low"

    # 网络
    net_ip_addr:
      template: "ip addr"
      description: "net_ip_addr 命令"
      when_to_use: "按需执行 net_ip_addr 场景"
      args: []
      examples: []
      risk: "low"
    net_ip_route:
      template: "ip route"
      description: "net_ip_route 命令"
      when_to_use: "按需执行 net_ip_route 场景"
      args: []
      examples: []
      risk: "low"
    net_stats:
      template: "cat /proc/net/dev"
      description: "net_stats 命令"
      when_to_use: "按需执行 net_stats 场景"
      args: []
      examples: []
      risk: "low"
    eth0_mac:
      template: "cat /sys/class/net/eth0/address"
      description: "eth0_mac 命令"
      when_to_use: "按需执行 eth0_mac 场景"
      args: []
      examples: []
      risk: "low"
    wifi_status:
      template: "iw dev wlan0 info"
      description: "wifi_status 命令"
      when_to_use: "按需执行 wifi_status 场景"
      args: []
      examples: []
      risk: "low"
    ping_test:
      template: "ping -c 4 {0}"
      description: "ping_test 命令"
      when_to_use: "按需执行 ping_test 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 常见总线（I2C/SPI/CAN）
    i2c_detect_0:
      template: "i2cdetect -y 0"
      description: "i2c_detect_0 命令"
      when_to_use: "按需执行 i2c_detect_0 场景"
      args: []
      examples: []
      risk: "low"
    i2c_detect_bus:
      template: "i2cdetect -y {0}"
      description: "i2c_detect_bus 命令"
      when_to_use: "按需执行 i2c_detect_bus 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    spi_devices:
      template: "ls /dev/spidev*"
      description: "spi_devices 命令"
      when_to_use: "按需执行 spi_devices 场景"
      args: []
      examples: []
      risk: "low"
    can_links:
      template: "ip -details link show type can"
      description: "can_links 命令"
      when_to_use: "按需执行 can_links 场景"
      args: []
      examples: []
      risk: "low"
    can_up:
      template: "ip link set {0} up type can bitrate {1}"
      description: "can_up 命令"
      when_to_use: "按需执行 can_up 场景"
      args: ["arg0", "arg1"]
      examples: []
      risk: "low"
    can_down:
      template: "ip link set {0} down"
      description: "can_down 命令"
      when_to_use: "按需执行 can_down 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 服务管理
    svc_status:
      template: "systemctl status {0} --no-pager"
      description: "svc_status 命令"
      when_to_use: "按需执行 svc_status 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_start:
      template: "systemctl start {0}"
      description: "svc_start 命令"
      when_to_use: "按需执行 svc_start 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_stop:
      template: "systemctl stop {0}"
      description: "svc_stop 命令"
      when_to_use: "按需执行 svc_stop 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_restart:
      template: "systemctl restart {0}"
      description: "svc_restart 命令"
      when_to_use: "按需执行 svc_restart 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_list:
      template: "systemctl list-units --type=service --no-pager"
      description: "svc_list 命令"
      when_to_use: "按需执行 svc_list 场景"
      args: []
      examples: []
      risk: "low"
    svc_failed:
      template: "systemctl list-units --state=failed --no-pager"
      description: "svc_failed 命令"
      when_to_use: "按需执行 svc_failed 场景"
      args: []
      examples: []
      risk: "low"
    journal_tail:
      template: "journalctl -n {0} --no-pager"
      description: "journal_tail 命令"
      when_to_use: "按需执行 journal_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    journal_svc:
      template: "journalctl -u {0} -n 50 --no-pager"
      description: "journal_svc 命令"
      when_to_use: "按需执行 journal_svc 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 进程
    proc_all:
      template: "ps -ef"
      description: "proc_all 命令"
      when_to_use: "按需执行 proc_all 场景"
      args: []
      examples: []
      risk: "low"
    proc_grep:
      template: "ps -ef | grep {0} | grep -v grep"
      description: "proc_grep 命令"
      when_to_use: "按需执行 proc_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    proc_top:
      template: "top -bn1 | head -20"
      description: "proc_top 命令"
      when_to_use: "按需执行 proc_top 场景"
      args: []
      examples: []
      risk: "low"
