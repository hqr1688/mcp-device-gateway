# Amlogic SoC 平台命令模板
# 适用芯片：S905X/D/Y/Z, S922X, S905X3/X4, S928X, C308X, T950D4, A311D 等
# 典型系统：Android + Linux 双系统、纯 Android、Debian/Ubuntu on Amlogic
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # ─────────────────────────────────────────────────────────
    # 硬件身份 & 序列号（Amlogic unifykeys 接口）
    # ─────────────────────────────────────────────────────────
    # 说明：unifykeys 是 Amlogic 内核驱动，通过 sysfs 读取烧录到 efuse/EEPROM 的硬件信息。
    # 写入名称后，再读取 read 节点，一次读取一个字段。
    hw_usid:
      template: "sh -c 'echo usid > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_usid 命令"
      when_to_use: "按需执行 hw_usid 场景"
      args: []
      examples: []
      risk: "low"
    hw_deviceid:
      template: "sh -c 'echo deviceid > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_deviceid 命令"
      when_to_use: "按需执行 hw_deviceid 场景"
      args: []
      examples: []
      risk: "low"
    hw_mac_bt:
      template: "sh -c 'echo mac_bt > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_mac_bt 命令"
      when_to_use: "按需执行 hw_mac_bt 场景"
      args: []
      examples: []
      risk: "low"
    hw_mac_wifi:
      template: "sh -c 'echo mac_wifi > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_mac_wifi 命令"
      when_to_use: "按需执行 hw_mac_wifi 场景"
      args: []
      examples: []
      risk: "low"
    hw_mac_eth:
      template: "sh -c 'echo mac_wifi_2 > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_mac_eth 命令"
      when_to_use: "按需执行 hw_mac_eth 场景"
      args: []
      examples: []
      risk: "low"
    hw_region_code:
      template: "sh -c 'echo region_code > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_region_code 命令"
      when_to_use: "按需执行 hw_region_code 场景"
      args: []
      examples: []
      risk: "low"
    hw_custom_key:
      template: "sh -c 'echo {0} > /sys/class/unifykeys/name && cat /sys/class/unifykeys/read'"
      description: "hw_custom_key 命令"
      when_to_use: "按需执行 hw_custom_key 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    hw_list_keys:
      template: "cat /sys/class/unifykeys/list"
      description: "hw_list_keys 命令"
      when_to_use: "按需执行 hw_list_keys 场景"
      args: []
      examples: []
      risk: "low"

    # CPU 序列号（通用 ARM 方式）
    hw_cpu_serial:
      template: "grep Serial /proc/cpuinfo"
      description: "hw_cpu_serial 命令"
      when_to_use: "按需执行 hw_cpu_serial 场景"
      args: []
      examples: []
      risk: "low"
    hw_cpu_info:
      template: "grep -E 'Processor|Hardware|Revision' /proc/cpuinfo"
      description: "hw_cpu_info 命令"
      when_to_use: "按需执行 hw_cpu_info 场景"
      args: []
      examples: []
      risk: "low"

    # eMMC CID（制造商/型号/序列号，mmcblkN 根据实际调整）
    hw_emmc_cid:
      template: "cat /sys/class/block/mmcblk2/device/cid"
      description: "hw_emmc_cid 命令"
      when_to_use: "按需执行 hw_emmc_cid 场景"
      args: []
      examples: []
      risk: "low"
    hw_emmc_name:
      template: "cat /sys/class/block/mmcblk2/device/name"
      description: "hw_emmc_name 命令"
      when_to_use: "按需执行 hw_emmc_name 场景"
      args: []
      examples: []
      risk: "low"
    hw_emmc_fwrev:
      template: "cat /sys/class/block/mmcblk2/device/fwrev"
      description: "hw_emmc_fwrev 命令"
      when_to_use: "按需执行 hw_emmc_fwrev 场景"
      args: []
      examples: []
      risk: "low"

    # 以太网 MAC
    hw_eth0_mac:
      template: "cat /sys/class/net/eth0/address"
      description: "hw_eth0_mac 命令"
      when_to_use: "按需执行 hw_eth0_mac 场景"
      args: []
      examples: []
      risk: "low"
    hw_eth1_mac:
      template: "cat /sys/class/net/eth1/address"
      description: "hw_eth1_mac 命令"
      when_to_use: "按需执行 hw_eth1_mac 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # 系统状态
    # ─────────────────────────────────────────────────────────
    sys_uname:
      template: "uname -a"
      description: "sys_uname 命令"
      when_to_use: "按需执行 sys_uname 场景"
      args: []
      examples: []
      risk: "low"
    sys_uptime:
      template: "uptime"
      description: "sys_uptime 命令"
      when_to_use: "按需执行 sys_uptime 场景"
      args: []
      examples: []
      risk: "low"
    sys_dmesg_tail:
      template: "dmesg | tail -n {0}"
      description: "sys_dmesg_tail 命令"
      when_to_use: "按需执行 sys_dmesg_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_dmesg_grep:
      template: "dmesg | grep {0}"
      description: "sys_dmesg_grep 命令"
      when_to_use: "按需执行 sys_dmesg_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_cpu_info:
      template: "cat /proc/cpuinfo"
      description: "sys_cpu_info 命令"
      when_to_use: "按需执行 sys_cpu_info 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_info:
      template: "cat /proc/meminfo"
      description: "sys_mem_info 命令"
      when_to_use: "按需执行 sys_mem_info 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_usage:
      template: "free -m"
      description: "sys_mem_usage 命令"
      when_to_use: "按需执行 sys_mem_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_disk_usage:
      template: "df -h"
      description: "sys_disk_usage 命令"
      when_to_use: "按需执行 sys_disk_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_mounts:
      template: "cat /proc/mounts"
      description: "sys_mounts 命令"
      when_to_use: "按需执行 sys_mounts 场景"
      args: []
      examples: []
      risk: "low"
    sys_cmdline:
      template: "cat /proc/cmdline"
      description: "sys_cmdline 命令"
      when_to_use: "按需执行 sys_cmdline 场景"
      args: []
      examples: []
      risk: "low"
    sys_version:
      template: "cat /proc/version"
      description: "sys_version 命令"
      when_to_use: "按需执行 sys_version 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # 温度监控
    # ─────────────────────────────────────────────────────────
    # Amlogic 通常有多个热区：CPU/DDR/GPU
    temp_all:
      template: "paste /sys/class/thermal/thermal_zone*/type /sys/class/thermal/thermal_zone*/temp"
      description: "temp_all 命令"
      when_to_use: "按需执行 temp_all 场景"
      args: []
      examples: []
      risk: "low"
    temp_cpu:
      template: "cat /sys/class/thermal/thermal_zone0/temp"
      description: "temp_cpu 命令"
      when_to_use: "按需执行 temp_cpu 场景"
      args: []
      examples: []
      risk: "low"
    temp_ddr:
      template: "cat /sys/class/thermal/thermal_zone1/temp"
      description: "temp_ddr 命令"
      when_to_use: "按需执行 temp_ddr 场景"
      args: []
      examples: []
      risk: "low"
    temp_gpu:
      template: "cat /sys/class/thermal/thermal_zone2/temp"
      description: "temp_gpu 命令"
      when_to_use: "按需执行 temp_gpu 场景"
      args: []
      examples: []
