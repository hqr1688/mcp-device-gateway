    # ─────────────────────────────────────────────────────────
    # CPU 频率 & 性能
    # ─────────────────────────────────────────────────────────
    cpu_freq_cur:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      description: "cpu_freq_cur 命令"
      when_to_use: "按需执行 cpu_freq_cur 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_max:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_max_freq"
      description: "cpu_freq_max 命令"
      when_to_use: "按需执行 cpu_freq_max 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_min:
