    gpu_freq_max:
      template: "cat /sys/class/mpgpu/max_freq"
      description: "gpu_freq_max 命令"
      when_to_use: "按需执行 gpu_freq_max 场景"
      args: []
      examples: []
      risk: "low"
    gpu_utilization:
      template: "cat /sys/class/mpgpu/scale_mode"
      description: "gpu_utilization 命令"
      when_to_use: "按需执行 gpu_utilization 场景"
      args: []
      examples: []
      risk: "low"
    gpu_driver:
      template: "cat /sys/module/mali/version"
      description: "gpu_driver 命令"
      when_to_use: "按需执行 gpu_driver 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # NPU（Neural Processing Unit，S905D3、T950D4、C308X 等含 NPU）
