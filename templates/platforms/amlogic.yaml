      template: "update {0}"
      description: "ota_local_update 命令"
      when_to_use: "按需执行 ota_local_update 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    # 检查 SoC 型号
    soc_model:
      template: "cat /sys/class/amlogic_board/board_id"
      description: "soc_model 命令"
      when_to_use: "按需执行 soc_model 场景"
      args: []
      examples: []
