      template: "ps -ef | grep {0} | grep -v grep"
      description: "proc_grep 命令"
      when_to_use: "按需执行 proc_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    proc_top:
      template: "top -bn1 | head -20"
      description: "proc_top 命令"
      when_to_use: "按需执行 proc_top 场景"
      args: []
      examples: []
      risk: "low"
    proc_mem_top:
      template: "ps -eo pid,ppid,cmd,%mem,%cpu --sort=-%mem | head -20"
      description: "proc_mem_top 命令"
      when_to_use: "按需执行 proc_mem_top 场景"
      args: []
