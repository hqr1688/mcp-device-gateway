    npu_info:
      template: "cat /sys/class/npu_model/info"
      description: "npu_info 命令"
      when_to_use: "按需执行 npu_info 场景"
      args: []
      examples: []
      risk: "low"
    npu_freq:
      template: "cat /sys/class/npu_model/clk_rate"
      description: "npu_freq 命令"
      when_to_use: "按需执行 npu_freq 场景"
      args: []
      examples: []
      risk: "low"
    npu_utilization:
      template: "cat /sys/class/npu_model/status"
      description: "npu_utilization 命令"
      when_to_use: "按需执行 npu_utilization 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # eMMC / 存储
    # ─────────────────────────────────────────────────────────
    storage_list:
      template: "ls -l /dev/mmcblk*"
      description: "storage_list 命令"
      when_to_use: "按需执行 storage_list 场景"
      args: []
      examples: []
      risk: "low"
    emmc_life:
      template: "cat /sys/class/block/mmcblk2/device/life_time"
      description: "emmc_life 命令"
      when_to_use: "按需执行 emmc_life 场景"
      args: []
      examples: []
      risk: "low"
    emmc_partitions:
      template: "cat /proc/partitions | grep mmcblk"
      description: "emmc_partitions 命令"
      when_to_use: "按需执行 emmc_partitions 场景"
      args: []
      examples: []
      risk: "low"
    mtd_list:
      template: "cat /proc/mtd"
      description: "mtd_list 命令"
      when_to_use: "按需执行 mtd_list 场景"
      args: []
