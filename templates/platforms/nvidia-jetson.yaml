# NVIDIA Jetson 平台命令模板
# 适用型号：Jetson Nano, TX1/TX2, Xavier NX, AGX Xavier, Orin NX, AGX Orin
# 典型系统：JetPack (Ubuntu 18.04/20.04/22.04 + L4T)
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # ─────────────────────────────────────────────────────────
    # Jetson 专有工具
    # ─────────────────────────────────────────────────────────
    # tegrastats：一次性采样 Jetson 系统状态（无需持续运行）
    # 输出示例：RAM 1024/7766MB ... CPU [45%@1190,15%@1190,...] TEMP cpu@45.5C gpu@42C
    tegrastats_once:
      template: "tegrastats --interval 1000 --stop"
      description: "tegrastats_once 命令"
      when_to_use: "按需执行 tegrastats_once 场景"
      args: []
      examples: []
      risk: "low"
    tegrastats_5s:
      template: "timeout 5 tegrastats --interval 1000"
      description: "tegrastats_5s 命令"
      when_to_use: "按需执行 tegrastats_5s 场景"
      args: []
      examples: []
      risk: "low"
    tegrastats_10s:
      template: "timeout 10 tegrastats --interval 1000"
      description: "tegrastats_10s 命令"
      when_to_use: "按需执行 tegrastats_10s 场景"
      args: []
      examples: []
      risk: "low"

    # nvpmodel：功耗模式管理（0=MAXN 最大性能, 1=5W 低功耗, etc.）
    power_mode_query:
      template: "nvpmodel -q"
      description: "power_mode_query 命令"
      when_to_use: "按需执行 power_mode_query 场景"
      args: []
      examples: []
      risk: "low"
    power_mode_verbose:
      template: "nvpmodel -q --verbose"
      description: "power_mode_verbose 命令"
      when_to_use: "按需执行 power_mode_verbose 场景"
      args: []
      examples: []
      risk: "low"
    power_mode_set:
      template: "nvpmodel -m {0}"
      description: "power_mode_set 命令"
      when_to_use: "按需执行 power_mode_set 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    power_mode_list:
      template: "nvpmodel -h"
      description: "power_mode_list 命令"
      when_to_use: "按需执行 power_mode_list 场景"
      args: []
      examples: []
      risk: "low"
    # 常用模式 ID（因型号不同而异，请参考官方文档）：
    # AGX Orin: 0=MAXN, 1=10W, 2=15W, 3=25W, 4=30W, 5=40W, 6=50W
    # Xavier NX 常见：0=15W_6CORE, 1=10W_6CORE, 2=10W_4CORE

    # jetson_clocks：锁定到最大频率（用于性能基准测试）
    clocks_show:
      template: "jetson_clocks --show"
      description: "clocks_show 命令"
      when_to_use: "按需执行 clocks_show 场景"
      args: []
      examples: []
      risk: "low"
    clocks_max:
      template: "jetson_clocks"
      description: "clocks_max 命令"
      when_to_use: "按需执行 clocks_max 场景"
      args: []
      examples: []
      risk: "low"
    clocks_restore:
      template: "jetson_clocks --restore"
      description: "clocks_restore 命令"
      when_to_use: "按需执行 clocks_restore 场景"
      args: []
      examples: []
      risk: "low"
    # 锁频持续模式（seconds 为持续秒数）
    clocks_max_for_sec:
      template: "timeout {0} jetson_clocks"
      description: "clocks_max_for_sec 命令"
      when_to_use: "按需执行 clocks_max_for_sec 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    # 仅锁定 EMC（内存控制器）频率
    emc_lock_max:
      template: "echo 1 > /sys/kernel/nvpmodel_emc_cap/emc_iso_cap 2>/dev/null"
      description: "emc_lock_max 命令"
      when_to_use: "按需执行 emc_lock_max 场景"
      args: []
      examples: []
      risk: "low"
    emc_cap_show:
      template: "cat /sys/kernel/nvpmodel_emc_cap/emc_iso_cap 2>/dev/null"
      description: "emc_cap_show 命令"
      when_to_use: "按需执行 emc_cap_show 场景"
      args: []
      examples: []
      risk: "low"

    # Jetson 型号与 L4T 版本
    jetson_model:
      template: "cat /proc/device-tree/model"
      description: "jetson_model 命令"
      when_to_use: "按需执行 jetson_model 场景"
      args: []
      examples: []
      risk: "low"
    l4t_version:
      template: "cat /etc/nv_tegra_release"
      description: "l4t_version 命令"
      when_to_use: "按需执行 l4t_version 场景"
      args: []
      examples: []
      risk: "low"
    jetpack_version:
      template: "dpkg -l nvidia-jetpack 2>/dev/null | tail -1"
      description: "jetpack_version 命令"
      when_to_use: "按需执行 jetpack_version 场景"
      args: []
      examples: []
      risk: "low"
    l4t_packages:
      template: "dpkg -l | grep nvidia-l4t"
      description: "l4t_packages 命令"
      when_to_use: "按需执行 l4t_packages 场景"
      args: []
      examples: []
      risk: "low"
    board_ids:
      template: "cat /proc/device-tree/chosen/plugin-manager/ids 2>/dev/null"
      description: "board_ids 命令"
      when_to_use: "按需执行 board_ids 场景"
      args: []
      examples: []
      risk: "low"
    kernel_abi:
      template: "uname -r"
      description: "kernel_abi 命令"
      when_to_use: "按需执行 kernel_abi 场景"
      args: []
      examples: []
      risk: "low"
    boot_slot:
      template: "nvbootctrl get-current-slot 2>/dev/null"
      description: "boot_slot 命令"
      when_to_use: "按需执行 boot_slot 场景"
      args: []
      examples: []
      risk: "low"
    boot_slot_info:
      template: "nvbootctrl dump-slots-info 2>/dev/null"
      description: "boot_slot_info 命令"
      when_to_use: "按需执行 boot_slot_info 场景"
      args: []
      examples: []
      risk: "low"
    secureboot_status:
      template: "cat /sys/firmware/tegra_fuse/odm_production_mode 2>/dev/null"
      description: "secureboot_status 命令"
      when_to_use: "按需执行 secureboot_status 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # 温度监控（Jetson 多个热区）
    # ─────────────────────────────────────────────────────────
    temp_all:
      template: "paste /sys/class/thermal/thermal_zone*/type /sys/class/thermal/thermal_zone*/temp"
      description: "temp_all 命令"
      when_to_use: "按需执行 temp_all 场景"
      args: []
      examples: []
      risk: "low"
    temp_cpu:
      template: "cat /sys/class/thermal/thermal_zone0/temp"
      description: "temp_cpu 命令"
      when_to_use: "按需执行 temp_cpu 场景"
      args: []
      examples: []
      risk: "low"
    temp_gpu:
      template: "cat /sys/class/thermal/thermal_zone1/temp"
      description: "temp_gpu 命令"
      when_to_use: "按需执行 temp_gpu 场景"
      args: []
      examples: []
      risk: "low"
    # SOC/Board 温度（Zone 编号因型号不同）
    temp_soc:
      template: "cat /sys/class/thermal/thermal_zone2/temp"
      description: "temp_soc 命令"
      when_to_use: "按需执行 temp_soc 场景"
      args: []
      examples: []
      risk: "low"
    temp_gpu_tegrastats:
      template: "tegrastats --interval 1000 --stop | grep -o 'gpu@[0-9.]*C'"
      description: "temp_gpu_tegrastats 命令"
      when_to_use: "按需执行 temp_gpu_tegrastats 场景"
      args: []
      examples: []
      risk: "low"
    temp_cpu_trip_points:
      template: "for z in /sys/class/thermal/thermal_zone*; do [ -f $z/trip_point_0_temp ] && echo $z:$(cat $z/trip_point_0_temp); done"
      description: "temp_cpu_trip_points 命令"
      when_to_use: "按需执行 temp_cpu_trip_points 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # CPU 频率（多核，ARM Cortex）
    # ─────────────────────────────────────────────────────────
    cpu_freq_cur:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      description: "cpu_freq_cur 命令"
      when_to_use: "按需执行 cpu_freq_cur 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_max:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq"
      description: "cpu_freq_max 命令"
      when_to_use: "按需执行 cpu_freq_max 场景"
      args: []
      examples: []
      risk: "low"
    cpu_governor:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
      description: "cpu_governor 命令"
      when_to_use: "按需执行 cpu_governor 场景"
      args: []
      examples: []
      risk: "low"
    cpu_set_governor:
      template: "echo {0} > /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
      description: "cpu_set_governor 命令"
      when_to_use: "按需执行 cpu_set_governor 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    cpu_available_governors:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_governors"
      description: "cpu_available_governors 命令"
      when_to_use: "按需执行 cpu_available_governors 场景"
      args: []
      examples: []
      risk: "low"
    cpu_online:
      template: "cat /sys/devices/system/cpu/online"
      description: "cpu_online 命令"
      when_to_use: "按需执行 cpu_online 场景"
      args: []
      examples: []
      risk: "low"
    cpu_idle_states:
      template: "for c in /sys/devices/system/cpu/cpu*/cpuidle/state*; do [ -d $c ] && echo $c:$(cat $c/name 2>/dev/null):$(cat $c/disable 2>/dev/null); done"
      description: "cpu_idle_states 命令"
      when_to_use: "按需执行 cpu_idle_states 场景"
      args: []
      examples: []
      risk: "low"
    cpu_hotplug_offline:
      template: "echo 0 > /sys/devices/system/cpu/cpu{0}/online"
      description: "cpu_hotplug_offline 命令"
      when_to_use: "按需执行 cpu_hotplug_offline 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    cpu_hotplug_online:
      template: "echo 1 > /sys/devices/system/cpu/cpu{0}/online"
      description: "cpu_hotplug_online 命令"
      when_to_use: "按需执行 cpu_hotplug_online 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # GPU（NVIDIA Ampere / Volta / Maxwell）
    # ─────────────────────────────────────────────────────────
    gpu_freq_cur:
      template: "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/cur_freq"
      description: "gpu_freq_cur 命令"
      when_to_use: "按需执行 gpu_freq_cur 场景"
      args: []
      examples: []
      risk: "low"
    gpu_freq_max:
      template: "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/max_freq"
      description: "gpu_freq_max 命令"
      when_to_use: "按需执行 gpu_freq_max 场景"
      args: []
      examples: []
      risk: "low"
    gpu_governor:
      template: "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/governor"
      description: "gpu_governor 命令"
      when_to_use: "按需执行 gpu_governor 场景"
      args: []
      examples: []
      risk: "low"
    gpu_set_max_freq:
      template: "echo {0} > /sys/devices/17000000.gpu/devfreq/17000000.gpu/max_freq"
      description: "gpu_set_max_freq 命令"
      when_to_use: "按需执行 gpu_set_max_freq 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    gpu_railgate_enable:
      template: "echo 1 > /sys/devices/17000000.gpu/railgate_enable"
      description: "gpu_railgate_enable 命令"
      when_to_use: "按需执行 gpu_railgate_enable 场景"
      args: []
      examples: []
      risk: "low"
    gpu_railgate_disable:
      template: "echo 0 > /sys/devices/17000000.gpu/railgate_enable"
      description: "gpu_railgate_disable 命令"
      when_to_use: "按需执行 gpu_railgate_disable 场景"
      args: []
      examples: []
      risk: "low"
    gpu_load:
      template: "cat /sys/devices/17000000.gpu/load"
      description: "gpu_load 命令"
      when_to_use: "按需执行 gpu_load 场景"
      args: []
      examples: []
      risk: "low"
    gpu_busy_time:
      template: "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/stats/total_trans"
      description: "gpu_busy_time 命令"
      when_to_use: "按需执行 gpu_busy_time 场景"
      args: []
      examples: []
      risk: "low"
    # CUDA 版本
    cuda_version:
      template: "nvcc --version"
      description: "cuda_version 命令"
      when_to_use: "按需执行 cuda_version 场景"
      args: []
      examples: []
      risk: "low"
    cudnn_version:
      template: "cat /usr/include/cudnn_version.h | grep -E 'CUDNN_MAJOR|CUDNN_MINOR|CUDNN_PATCHLEVEL'"
      description: "cudnn_version 命令"
      when_to_use: "按需执行 cudnn_version 场景"
      args: []
      examples: []
      risk: "low"
    cuda_visible_devices:
      template: "echo $CUDA_VISIBLE_DEVICES"
      description: "cuda_visible_devices 命令"
      when_to_use: "按需执行 cuda_visible_devices 场景"
      args: []
      examples: []
      risk: "low"
    cuda_samples_ls:
      template: "ls /usr/local/cuda/samples"
      description: "cuda_samples_ls 命令"
      when_to_use: "按需执行 cuda_samples_ls 场景"
      args: []
      examples: []
      risk: "low"
    cuda_sample_devicequery:
      template: "/usr/local/cuda/samples/1_Utilities/deviceQuery/deviceQuery"
      description: "cuda_sample_devicequery 命令"
      when_to_use: "按需执行 cuda_sample_devicequery 场景"
      args: []
      examples: []
      risk: "low"
    cuda_smi_like:
      template: "cat /sys/kernel/debug/gpu_stats 2>/dev/null"
      description: "cuda_smi_like 命令"
      when_to_use: "按需执行 cuda_smi_like 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # DLA（Deep Learning Accelerator，Xavier/Orin 含）
    # ─────────────────────────────────────────────────────────
    dla_info:
      template: "cat /sys/kernel/debug/nvdla0/stats"
      description: "dla_info 命令"
      when_to_use: "按需执行 dla_info 场景"
      args: []
      examples: []
      risk: "low"
    dla0_status:
      template: "cat /sys/kernel/debug/nvdla0/status"
      description: "dla0_status 命令"
      when_to_use: "按需执行 dla0_status 场景"
