# NVIDIA Jetson 平台命令模板
# 适用型号：Jetson Nano, TX1/TX2, Xavier NX, AGX Xavier, Orin NX, AGX Orin
# 典型系统：JetPack (Ubuntu 18.04/20.04/22.04 + L4T)
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  # ─────────────────────────────────────────────────────────
  # Jetson 专有工具
  # ─────────────────────────────────────────────────────────
  # tegrastats：一次性采样 Jetson 系统状态（无需持续运行）
  # 输出示例：RAM 1024/7766MB ... CPU [45%@1190,15%@1190,...] TEMP cpu@45.5C gpu@42C
  tegrastats_once:    "tegrastats --interval 1000 --stop"
  tegrastats_5s:      "timeout 5 tegrastats --interval 1000"
  tegrastats_10s:     "timeout 10 tegrastats --interval 1000"

  # nvpmodel：功耗模式管理（0=MAXN 最大性能, 1=5W 低功耗, etc.）
  power_mode_query:   "nvpmodel -q"
  power_mode_verbose: "nvpmodel -q --verbose"
  power_mode_set:     "nvpmodel -m {0}"
  power_mode_list:    "nvpmodel -h"
  # 常用模式 ID（因型号不同而异，请参考官方文档）：
  # AGX Orin: 0=MAXN, 1=10W, 2=15W, 3=25W, 4=30W, 5=40W, 6=50W
  # Xavier NX 常见：0=15W_6CORE, 1=10W_6CORE, 2=10W_4CORE

  # jetson_clocks：锁定到最大频率（用于性能基准测试）
  clocks_show:        "jetson_clocks --show"
  clocks_max:         "jetson_clocks"
  clocks_restore:     "jetson_clocks --restore"
  # 锁频持续模式（seconds 为持续秒数）
  clocks_max_for_sec: "timeout {0} jetson_clocks"
  # 仅锁定 EMC（内存控制器）频率
  emc_lock_max:       "echo 1 > /sys/kernel/nvpmodel_emc_cap/emc_iso_cap 2>/dev/null"
  emc_cap_show:       "cat /sys/kernel/nvpmodel_emc_cap/emc_iso_cap 2>/dev/null"

  # Jetson 型号与 L4T 版本
  jetson_model:       "cat /proc/device-tree/model"
  l4t_version:        "cat /etc/nv_tegra_release"
  jetpack_version:    "dpkg -l nvidia-jetpack 2>/dev/null | tail -1"
  l4t_packages:       "dpkg -l | grep nvidia-l4t"
  board_ids:          "cat /proc/device-tree/chosen/plugin-manager/ids 2>/dev/null"
  kernel_abi:         "uname -r"
  boot_slot:          "nvbootctrl get-current-slot 2>/dev/null"
  boot_slot_info:     "nvbootctrl dump-slots-info 2>/dev/null"
  secureboot_status:  "cat /sys/firmware/tegra_fuse/odm_production_mode 2>/dev/null"

  # ─────────────────────────────────────────────────────────
  # 温度监控（Jetson 多个热区）
  # ─────────────────────────────────────────────────────────
  temp_all:           "paste /sys/class/thermal/thermal_zone*/type /sys/class/thermal/thermal_zone*/temp"
  temp_cpu:           "cat /sys/class/thermal/thermal_zone0/temp"
  temp_gpu:           "cat /sys/class/thermal/thermal_zone1/temp"
  # SOC/Board 温度（Zone 编号因型号不同）
  temp_soc:           "cat /sys/class/thermal/thermal_zone2/temp"
  temp_gpu_tegrastats: "tegrastats --interval 1000 --stop | grep -o 'gpu@[0-9.]*C'"
  temp_cpu_trip_points: "for z in /sys/class/thermal/thermal_zone*; do [ -f $z/trip_point_0_temp ] && echo $z:$(cat $z/trip_point_0_temp); done"

  # ─────────────────────────────────────────────────────────
  # CPU 频率（多核，ARM Cortex）
  # ─────────────────────────────────────────────────────────
  cpu_freq_cur:       "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
  cpu_freq_max:       "cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq"
  cpu_governor:       "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
  cpu_set_governor:   "echo {0} > /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
  cpu_available_governors: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_available_governors"
  cpu_online:         "cat /sys/devices/system/cpu/online"
  cpu_idle_states:    "for c in /sys/devices/system/cpu/cpu*/cpuidle/state*; do [ -d $c ] && echo $c:$(cat $c/name 2>/dev/null):$(cat $c/disable 2>/dev/null); done"
  cpu_hotplug_offline: "echo 0 > /sys/devices/system/cpu/cpu{0}/online"
  cpu_hotplug_online:  "echo 1 > /sys/devices/system/cpu/cpu{0}/online"

  # ─────────────────────────────────────────────────────────
  # GPU（NVIDIA Ampere / Volta / Maxwell）
  # ─────────────────────────────────────────────────────────
  gpu_freq_cur:       "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/cur_freq"
  gpu_freq_max:       "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/max_freq"
  gpu_governor:       "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/governor"
  gpu_set_max_freq:   "echo {0} > /sys/devices/17000000.gpu/devfreq/17000000.gpu/max_freq"
  gpu_railgate_enable: "echo 1 > /sys/devices/17000000.gpu/railgate_enable"
  gpu_railgate_disable: "echo 0 > /sys/devices/17000000.gpu/railgate_enable"
  gpu_load:           "cat /sys/devices/17000000.gpu/load"
  gpu_busy_time:      "cat /sys/devices/17000000.gpu/devfreq/17000000.gpu/stats/total_trans"
  # CUDA 版本
  cuda_version:       "nvcc --version"
  cudnn_version:      "cat /usr/include/cudnn_version.h | grep -E 'CUDNN_MAJOR|CUDNN_MINOR|CUDNN_PATCHLEVEL'"
  cuda_visible_devices: "echo $CUDA_VISIBLE_DEVICES"
  cuda_samples_ls:    "ls /usr/local/cuda/samples"
  cuda_sample_devicequery: "/usr/local/cuda/samples/1_Utilities/deviceQuery/deviceQuery"
  cuda_smi_like:      "cat /sys/kernel/debug/gpu_stats 2>/dev/null"

  # ─────────────────────────────────────────────────────────
  # DLA（Deep Learning Accelerator，Xavier/Orin 含）
  # ─────────────────────────────────────────────────────────
  dla_info:           "cat /sys/kernel/debug/nvdla0/stats"
  dla0_status:        "cat /sys/kernel/debug/nvdla0/status"
  dla1_status:        "cat /sys/kernel/debug/nvdla1/status"

  # TensorRT（Jetson AI 推理核心）
  tensorrt_version:   "dpkg -l | grep nvinfer"
  trtexec_help:       "trtexec --help"
  trtexec_bench_fp16: "trtexec --onnx={0} --fp16 --workspace=1024"
  trtexec_bench_int8: "trtexec --onnx={0} --int8 --workspace=1024"
  trtexec_build_engine_fp16: "trtexec --onnx={0} --saveEngine={1} --fp16 --workspace=1024"
  trtexec_run_engine: "trtexec --loadEngine={0}"
  trtexec_dla0:       "trtexec --onnx={0} --useDLACore=0 --allowGPUFallback"
  trtexec_dla1:       "trtexec --onnx={0} --useDLACore=1 --allowGPUFallback"

  # DeepStream（视频 AI 管线）
  deepstream_version: "dpkg -l | grep deepstream"
  deepstream_apps:    "ls /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps"
  deepstream_test1:   "deepstream-app -c /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/source1_usb_dec_infer_resnet_int8.txt"
  deepstream_plugins: "gst-inspect-1.0 | grep -E 'nvv4l2|nvargus|nvstreammux|nvinfer'"

  # ─────────────────────────────────────────────────────────
  # 电源监控（INA3221 电流传感器，读取实时功耗）
  # ─────────────────────────────────────────────────────────
  # 路径因型号不同，以下以 AGX Orin 为例
  power_all:          "cat /sys/bus/i2c/drivers/ina3221/*/iio:device*/in_power*_input"
  power_module:       "cat /sys/bus/i2c/drivers/ina3221/1-0040/iio:device0/in_power0_input"
  current_module:     "cat /sys/bus/i2c/drivers/ina3221/1-0040/iio:device0/in_current0_input"
  voltage_module:     "cat /sys/bus/i2c/drivers/ina3221/1-0040/iio:device0/in_voltage0_input"
  power_all_currents: "cat /sys/bus/i2c/drivers/ina3221/*/iio:device*/in_current*_input"
  power_all_voltages: "cat /sys/bus/i2c/drivers/ina3221/*/iio:device*/in_voltage*_input"

  # 风扇控制（不同机型路径不同，以下同时覆盖常见路径）
  fan_pwm_legacy_get: "cat /sys/devices/pwm-fan/target_pwm"
  fan_pwm_legacy_set: "echo {0} > /sys/devices/pwm-fan/target_pwm"
  fan_pwm_hwmon_get:  "cat /sys/class/hwmon/hwmon*/pwm1"
  fan_pwm_hwmon_set:  "echo {0} > /sys/class/hwmon/hwmon*/pwm1"
  fan_rpm_get:        "cat /sys/class/hwmon/hwmon*/fan1_input"
  fan_control_mode:   "cat /sys/class/hwmon/hwmon*/pwm1_enable"
  fan_set_manual:     "echo 1 > /sys/class/hwmon/hwmon*/pwm1_enable"
  fan_set_auto:       "echo 2 > /sys/class/hwmon/hwmon*/pwm1_enable"
  nvfancontrol_status: "systemctl status nvfancontrol --no-pager"
  nvfancontrol_restart: "systemctl restart nvfancontrol"

  # ─────────────────────────────────────────────────────────
  # 存储（UFS / eMMC / NVMe）
  # ─────────────────────────────────────────────────────────
  storage_list:       "ls -l /dev/mmcblk* /dev/nvme* /dev/sd*"
  nvme_info:          "nvme list"
  nvme_smart:         "nvme smart-log /dev/nvme0n1"
  disk_usage:         "df -h"

  # ─────────────────────────────────────────────────────────
  # 摄像头（CSI，需 JetPack 驱动支持）
  # ─────────────────────────────────────────────────────────
  camera_list:        "v4l2-ctl --list-devices"
  camera_formats:     "v4l2-ctl -d /dev/video{0} --list-formats-ext"
  nvargus_status:     "systemctl status nvargus-daemon --no-pager"
  nvargus_restart:    "systemctl restart nvargus-daemon"
  nvargus_logs:       "journalctl -u nvargus-daemon -n 100 --no-pager"
  csi_video_nodes:    "ls -l /dev/video* /dev/media*"
  camera_v4l2_all:    "for d in /dev/video*; do v4l2-ctl -d $d --all; done"
  argus_preview_10s:  "timeout 10 gst-launch-1.0 nvarguscamerasrc ! fakesink"
  csi_capture_jpeg:   "gst-launch-1.0 -e nvarguscamerasrc num-buffers=1 ! 'video/x-raw(memory:NVMM),width=1920,height=1080,framerate=30/1' ! nvjpegenc ! filesink location={0}"
  csi_capture_h264_10s: "timeout 10 gst-launch-1.0 -e nvarguscamerasrc ! nvv4l2h264enc ! h264parse ! qtmux ! filesink location={0}"

  # NVENC / NVDEC 设备节点（视频编解码能力检查）
  nvenc_node:         "ls -l /dev/nvhost-msenc"
  nvdec_node:         "ls -l /dev/nvhost-nvdec"
  vic_node:           "ls -l /dev/nvhost-vic"
  nvjpeg_node:        "ls -l /dev/nvhost-nvjpg"
  nvenc_gst_test:     "gst-launch-1.0 -e videotestsrc num-buffers=120 ! nvvidconv ! nvv4l2h264enc ! h264parse ! fakesink"
  nvdec_gst_test:     "gst-launch-1.0 filesrc location={0} ! qtdemux ! h264parse ! nvv4l2decoder ! fakesink"

  # ─────────────────────────────────────────────────────────
  # 网络
  # ─────────────────────────────────────────────────────────
  net_ip_addr:        "ip addr"
  net_ip_route:       "ip route"
  eth_mac:            "cat /sys/class/net/eth0/address"
  ping_test:          "ping -c 4 {0}"

  # ─────────────────────────────────────────────────────────
  # 容器（Jetson 上常用 Docker 跑 AI 推理）
  # ─────────────────────────────────────────────────────────
  docker_ps:          "docker ps"
  docker_images:      "docker images"
  docker_stats:       "docker stats --no-stream"
  docker_logs:        "docker logs --tail 50 {0}"
  docker_runtime_info: "docker info | grep -i -E 'Runtimes|nvidia'"
  docker_run_nvidia_smoke: "docker run --rm --runtime nvidia nvcr.io/nvidia/l4t-base:r35.4.1 uname -a"
  docker_run_cuda_smoke: "docker run --rm --runtime nvidia nvcr.io/nvidia/l4t-base:r35.4.1 bash -lc 'ls /usr/local/cuda || true'"
  docker_run_tegrastats: "docker run --rm --runtime nvidia --pid=host nvcr.io/nvidia/l4t-base:r35.4.1 tegrastats --interval 1000 --stop"

  # BPMP 时钟/电源（Jetson 低层调试）
  bpmp_clocks:        "cat /sys/kernel/debug/bpmp/debug/clk/clk_tree | head -n 120"
  bpmp_rails:         "cat /sys/kernel/debug/bpmp/debug/regulator/regulator_summary"
  bpmp_clk_emc:       "cat /sys/kernel/debug/bpmp/debug/clk/emc/rate"
  bpmp_clk_gpu:       "cat /sys/kernel/debug/bpmp/debug/clk/gpu/rate"
  bpmp_clk_cpu:       "cat /sys/kernel/debug/bpmp/debug/clk/cluster0/rate 2>/dev/null"
  bpmp_set_clk_emc:   "echo {0} > /sys/kernel/debug/bpmp/debug/clk/emc/rate"

  # 多媒体框架与依赖探测
  gst_version:        "gst-launch-1.0 --version"
  gst_nvidia_plugins: "gst-inspect-1.0 | grep -E 'nvargus|nvv4l2|nvvidconv|nvegl'"
  ffmpeg_hwaccels:    "ffmpeg -hwaccels"
  ffmpeg_codecs_nv:   "ffmpeg -codecs | grep -i nv"

  # Python AI 运行时探测（常用于排障）
  py_torch_cuda:      "python3 -c 'import torch; print(torch.__version__, torch.cuda.is_available(), torch.cuda.device_count())'"
  py_tf_gpu:          "python3 -c 'import tensorflow as tf; print(tf.__version__, tf.config.list_physical_devices(\"GPU\"))'"
  py_onnxruntime_gpu: "python3 -c 'import onnxruntime as ort; print(ort.__version__, ort.get_available_providers())'"

  # Jetson-IO / 40-pin 头配置（若安装）
  jetson_io_list:     "ls /opt/nvidia/jetson-io"
  jetson_io_configs:  "ls /boot/*.dtbo"

  # Flash/恢复模式相关（主机侧工具，通常在开发主机执行）
  l4t_flash_help:     "ls /opt/nvidia/l4t*/Linux_for_Tegra/ 2>/dev/null"
  l4t_flash_devices:  "lsusb | grep -i nvidia"

  # ─────────────────────────────────────────────────────────
  # 服务管理（systemd）
  # ─────────────────────────────────────────────────────────
  svc_status:         "systemctl status {0} --no-pager"
  svc_start:          "systemctl start {0}"
  svc_stop:           "systemctl stop {0}"
  svc_restart:        "systemctl restart {0}"
  svc_list:           "systemctl list-units --type=service --no-pager"
  svc_failed:         "systemctl list-units --state=failed --no-pager"
  journal_tail:       "journalctl -n {0} --no-pager"
  journal_svc:        "journalctl -u {0} -n 50 --no-pager"

  # ─────────────────────────────────────────────────────────
  # 进程
  # ─────────────────────────────────────────────────────────
  proc_all:           "ps -ef"
  proc_grep:          "ps -ef | grep {0} | grep -v grep"
  proc_top:           "top -bn1 | head -20"
  sys_mem_usage:      "free -h"
