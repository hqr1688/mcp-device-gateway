      risk: "low"
    dla1_status:
      template: "cat /sys/kernel/debug/nvdla1/status"
      description: "dla1_status 命令"
      when_to_use: "按需执行 dla1_status 场景"
      args: []
      examples: []
      risk: "low"

    # TensorRT（Jetson AI 推理核心）
    tensorrt_version:
      template: "dpkg -l | grep nvinfer"
      description: "tensorrt_version 命令"
      when_to_use: "按需执行 tensorrt_version 场景"
      args: []
      examples: []
      risk: "low"
    trtexec_help:
      template: "trtexec --help"
      description: "trtexec_help 命令"
      when_to_use: "按需执行 trtexec_help 场景"
      args: []
      examples: []
      risk: "low"
    trtexec_bench_fp16:
      template: "trtexec --onnx={0} --fp16 --workspace=1024"
      description: "trtexec_bench_fp16 命令"
      when_to_use: "按需执行 trtexec_bench_fp16 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    trtexec_bench_int8:
      template: "trtexec --onnx={0} --int8 --workspace=1024"
      description: "trtexec_bench_int8 命令"
      when_to_use: "按需执行 trtexec_bench_int8 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    trtexec_build_engine_fp16:
      template: "trtexec --onnx={0} --saveEngine={1} --fp16 --workspace=1024"
      description: "trtexec_build_engine_fp16 命令"
