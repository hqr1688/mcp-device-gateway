    deepstream_plugins:
      template: "gst-inspect-1.0 | grep -E 'nvv4l2|nvargus|nvstreammux|nvinfer'"
      description: "deepstream_plugins 命令"
      when_to_use: "按需执行 deepstream_plugins 场景"
      args: []
      examples: []
      risk: "low"

    # ─────────────────────────────────────────────────────────
    # 电源监控（INA3221 电流传感器，读取实时功耗）
    # ─────────────────────────────────────────────────────────
    # 路径因型号不同，以下以 AGX Orin 为例
    power_all:
      template: "cat /sys/bus/i2c/drivers/ina3221/*/iio:device*/in_power*_input"
      description: "power_all 命令"
      when_to_use: "按需执行 power_all 场景"
      args: []
      examples: []
      risk: "low"
    power_module:
      template: "cat /sys/bus/i2c/drivers/ina3221/1-0040/iio:device0/in_power0_input"
      description: "power_module 命令"
      when_to_use: "按需执行 power_module 场景"
      args: []
      examples: []
      risk: "low"
    current_module:
      template: "cat /sys/bus/i2c/drivers/ina3221/1-0040/iio:device0/in_current0_input"
      description: "current_module 命令"
      when_to_use: "按需执行 current_module 场景"
      args: []
      examples: []
      risk: "low"
    voltage_module:
      template: "cat /sys/bus/i2c/drivers/ina3221/1-0040/iio:device0/in_voltage0_input"
      description: "voltage_module 命令"
      when_to_use: "按需执行 voltage_module 场景"
      args: []
      examples: []
      risk: "low"
    power_all_currents:
      template: "cat /sys/bus/i2c/drivers/ina3221/*/iio:device*/in_current*_input"
      description: "power_all_currents 命令"
      when_to_use: "按需执行 power_all_currents 场景"
      args: []
      examples: []
      risk: "low"
    power_all_voltages:
      template: "cat /sys/bus/i2c/drivers/ina3221/*/iio:device*/in_voltage*_input"
      description: "power_all_voltages 命令"
      when_to_use: "按需执行 power_all_voltages 场景"
      args: []
      examples: []
      risk: "low"

    # 风扇控制（不同机型路径不同，以下同时覆盖常见路径）
    fan_pwm_legacy_get:
      template: "cat /sys/devices/pwm-fan/target_pwm"
      description: "fan_pwm_legacy_get 命令"
      when_to_use: "按需执行 fan_pwm_legacy_get 场景"
      args: []
      examples: []
      risk: "low"
