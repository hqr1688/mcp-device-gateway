    trtexec_run_engine:
      template: "trtexec --loadEngine={0}"
      description: "trtexec_run_engine 命令"
      when_to_use: "按需执行 trtexec_run_engine 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    trtexec_dla0:
      template: "trtexec --onnx={0} --useDLACore=0 --allowGPUFallback"
      description: "trtexec_dla0 命令"
      when_to_use: "按需执行 trtexec_dla0 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    trtexec_dla1:
      template: "trtexec --onnx={0} --useDLACore=1 --allowGPUFallback"
      description: "trtexec_dla1 命令"
      when_to_use: "按需执行 trtexec_dla1 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # DeepStream（视频 AI 管线）
    deepstream_version:
      template: "dpkg -l | grep deepstream"
      description: "deepstream_version 命令"
      when_to_use: "按需执行 deepstream_version 场景"
      args: []
      examples: []
      risk: "low"
    deepstream_apps:
      template: "ls /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps"
      description: "deepstream_apps 命令"
      when_to_use: "按需执行 deepstream_apps 场景"
      args: []
      examples: []
      risk: "low"
    deepstream_test1:
      template: "deepstream-app -c /opt/nvidia/deepstream/deepstream/samples/configs/deepstream-app/source1_usb_dec_infer_resnet_int8.txt"
      description: "deepstream_test1 命令"
      when_to_use: "按需执行 deepstream_test1 场景"
      args: []
      examples: []
