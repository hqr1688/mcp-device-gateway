# Raspberry Pi 平台命令模板
# 适用型号：Pi Zero/Zero 2, Pi 2/3/4/5, Pi 400, Compute Module 3/4/5
# 典型系统：Raspberry Pi OS (Bullseye/Bookworm), Ubuntu Server
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # ─────────────────────────────────────────────────────────
    # Raspberry Pi 专有工具（vcgencmd / raspi-config）
    # ─────────────────────────────────────────────────────────
    # CPU/GPU 温度（vcgencmd 是 VideoCore 固件的专用工具）
    vc_temp:
      template: "vcgencmd measure_temp"
      description: "vc_temp 命令"
      when_to_use: "按需执行 vc_temp 场景"
      args: []
      examples: []
      risk: "low"
    vc_throttle:
      template: "vcgencmd get_throttled"
      description: "vc_throttle 命令"
      when_to_use: "按需执行 vc_throttle 场景"
      args: []
      examples: []
      risk: "low"
    # 解读 throttle 状态码：0x50000 = 曾经过热，0x5 = 当前限速
    vc_voltage_core:
      template: "vcgencmd measure_volts core"
      description: "vc_voltage_core 命令"
      when_to_use: "按需执行 vc_voltage_core 场景"
      args: []
      examples: []
      risk: "low"
    vc_voltage_sdram:
