    dev_nodes:
      template: "ls -l /dev"
      description: "dev_nodes 命令"
      when_to_use: "按需执行 dev_nodes 场景"
      args: []
      examples: []
      risk: "low"
    storage_devices:
      template: "ls -l /dev/mmcblk* /dev/sd* /dev/nvme*"
      description: "storage_devices 命令"
      when_to_use: "按需执行 storage_devices 场景"
      args: []
      examples: []
      risk: "low"
    storage_partitions:
      template: "cat /proc/partitions"
      description: "storage_partitions 命令"
      when_to_use: "按需执行 storage_partitions 场景"
      args: []
      examples: []
      risk: "low"
    mtd_list:
      template: "cat /proc/mtd"
      description: "mtd_list 命令"
      when_to_use: "按需执行 mtd_list 场景"
      args: []
      examples: []
      risk: "low"

    # 网络
    net_ip_addr:
      template: "ip addr"
      description: "net_ip_addr 命令"
      when_to_use: "按需执行 net_ip_addr 场景"
      args: []
      examples: []
      risk: "low"
    net_ip_route:
      template: "ip route"
      description: "net_ip_route 命令"
      when_to_use: "按需执行 net_ip_route 场景"
      args: []
      examples: []
      risk: "low"
    net_links:
      template: "ip link"
      description: "net_links 命令"
      when_to_use: "按需执行 net_links 场景"
      args: []
      examples: []
      risk: "low"
    net_stats:
      template: "cat /proc/net/dev"
      description: "net_stats 命令"
      when_to_use: "按需执行 net_stats 场景"
      args: []
