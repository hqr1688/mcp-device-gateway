# 通用嵌入式 Linux 平台命令模板
# 适用场景：无法确定具体 SoC/厂商时的安全基础模板
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # 系统基础
    sys_uname:
      template: "uname -a"
      description: "sys_uname 命令"
      when_to_use: "按需执行 sys_uname 场景"
      args: []
      examples: []
      risk: "low"
    sys_uptime:
      template: "uptime"
      description: "sys_uptime 命令"
      when_to_use: "按需执行 sys_uptime 场景"
      args: []
      examples: []
      risk: "low"
    sys_hostname:
      template: "hostname"
      description: "sys_hostname 命令"
      when_to_use: "按需执行 sys_hostname 场景"
      args: []
      examples: []
      risk: "low"
    sys_os_release:
      template: "cat /etc/os-release"
      description: "sys_os_release 命令"
      when_to_use: "按需执行 sys_os_release 场景"
      args: []
      examples: []
      risk: "low"
    sys_kernel_cmdline:
      template: "cat /proc/cmdline"
      description: "sys_kernel_cmdline 命令"
      when_to_use: "按需执行 sys_kernel_cmdline 场景"
      args: []
      examples: []
      risk: "low"
    sys_cpu_info:
      template: "cat /proc/cpuinfo"
      description: "sys_cpu_info 命令"
      when_to_use: "按需执行 sys_cpu_info 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_info:
      template: "cat /proc/meminfo"
      description: "sys_mem_info 命令"
      when_to_use: "按需执行 sys_mem_info 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_usage:
      template: "free -m"
      description: "sys_mem_usage 命令"
      when_to_use: "按需执行 sys_mem_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_disk_usage:
      template: "df -h"
      description: "sys_disk_usage 命令"
      when_to_use: "按需执行 sys_disk_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_mounts:
      template: "cat /proc/mounts"
      description: "sys_mounts 命令"
      when_to_use: "按需执行 sys_mounts 场景"
      args: []
      examples: []
      risk: "low"
    sys_dmesg_tail:
      template: "dmesg | tail -n {0}"
      description: "sys_dmesg_tail 命令"
      when_to_use: "按需执行 sys_dmesg_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_dmesg_grep:
      template: "dmesg | grep {0}"
      description: "sys_dmesg_grep 命令"
      when_to_use: "按需执行 sys_dmesg_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 温度与频率
    temp_all:
      template: "for z in /sys/class/thermal/thermal_zone*; do [ -d $z ] && echo $(cat $z/type 2>/dev/null):$(cat $z/temp 2>/dev/null); done"
      description: "temp_all 命令"
      when_to_use: "按需执行 temp_all 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_cur:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      description: "cpu_freq_cur 命令"
      when_to_use: "按需执行 cpu_freq_cur 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_max:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq"
      description: "cpu_freq_max 命令"
      when_to_use: "按需执行 cpu_freq_max 场景"
      args: []
      examples: []
      risk: "low"
    cpu_governor:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
      description: "cpu_governor 命令"
      when_to_use: "按需执行 cpu_governor 场景"
      args: []
      examples: []
      risk: "low"

    # 设备与存储
    dev_block:
      template: "lsblk"
      description: "dev_block 命令"
      when_to_use: "按需执行 dev_block 场景"
      args: []
      examples: []
