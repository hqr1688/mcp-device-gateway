    net_arp:
      template: "ip neigh"
      description: "net_arp 命令"
      when_to_use: "按需执行 net_arp 场景"
      args: []
      examples: []
      risk: "low"
    ping_test:
      template: "ping -c 4 {0}"
      description: "ping_test 命令"
      when_to_use: "按需执行 ping_test 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 文件与日志
    file_list:
      template: "ls -al {0}"
      description: "file_list 命令"
      when_to_use: "按需执行 file_list 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    file_read:
      template: "cat {0}"
      description: "file_read 命令"
      when_to_use: "按需执行 file_read 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    file_tail:
      template: "tail -n {0} {1}"
      description: "file_tail 命令"
      when_to_use: "按需执行 file_tail 场景"
      args: ["arg0", "arg1"]
      examples: []
      risk: "low"
    file_grep:
      template: "grep {0} {1}"
      description: "file_grep 命令"
      when_to_use: "按需执行 file_grep 场景"
      args: ["arg0", "arg1"]
      examples: []
      risk: "low"

    # 服务（优先 systemd，不可用时可替换为 busybox init 脚本）
    svc_status:
      template: "systemctl status {0} --no-pager"
      description: "svc_status 命令"
      when_to_use: "按需执行 svc_status 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_start:
      template: "systemctl start {0}"
      description: "svc_start 命令"
      when_to_use: "按需执行 svc_start 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_stop:
      template: "systemctl stop {0}"
      description: "svc_stop 命令"
      when_to_use: "按需执行 svc_stop 场景"
      args: ["arg0"]
