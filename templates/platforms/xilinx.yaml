# Xilinx 平台命令模板
# 适用平台：Zynq-7000, Zynq UltraScale+ MPSoC, Versal
# 典型系统：PetaLinux / Yocto / Ubuntu on Zynq
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # 系统基础
    sys_uname:
      template: "uname -a"
      description: "sys_uname 命令"
      when_to_use: "按需执行 sys_uname 场景"
      args: []
      examples: []
      risk: "low"
    sys_uptime:
      template: "uptime"
      description: "sys_uptime 命令"
      when_to_use: "按需执行 sys_uptime 场景"
      args: []
      examples: []
      risk: "low"
    sys_os_release:
      template: "cat /etc/os-release"
      description: "sys_os_release 命令"
      when_to_use: "按需执行 sys_os_release 场景"
      args: []
      examples: []
      risk: "low"
    sys_cpu_info:
      template: "cat /proc/cpuinfo"
      description: "sys_cpu_info 命令"
      when_to_use: "按需执行 sys_cpu_info 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_usage:
      template: "free -m"
      description: "sys_mem_usage 命令"
      when_to_use: "按需执行 sys_mem_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_disk_usage:
      template: "df -h"
      description: "sys_disk_usage 命令"
      when_to_use: "按需执行 sys_disk_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_dmesg_tail:
      template: "dmesg | tail -n {0}"
      description: "sys_dmesg_tail 命令"
      when_to_use: "按需执行 sys_dmesg_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_dmesg_grep:
      template: "dmesg | grep {0}"
      description: "sys_dmesg_grep 命令"
      when_to_use: "按需执行 sys_dmesg_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    soc_model:
      template: "cat /proc/device-tree/model"
      description: "soc_model 命令"
      when_to_use: "按需执行 soc_model 场景"
      args: []
      examples: []
      risk: "low"
    soc_compatible:
      template: "cat /proc/device-tree/compatible | tr '\\0' '\\n'"
      description: "soc_compatible 命令"
      when_to_use: "按需执行 soc_compatible 场景"
      args: []
      examples: []
      risk: "low"

    # 温度与频率
    temp_all:
      template: "for z in /sys/class/thermal/thermal_zone*; do [ -d $z ] && echo $(cat $z/type 2>/dev/null):$(cat $z/temp 2>/dev/null); done"
      description: "temp_all 命令"
      when_to_use: "按需执行 temp_all 场景"
      args: []
      examples: []
      risk: "low"
    cpu_freq_cur:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_cur_freq"
      description: "cpu_freq_cur 命令"
      when_to_use: "按需执行 cpu_freq_cur 场景"
      args: []
      examples: []
      risk: "low"
    cpu_governor:
      template: "cat /sys/devices/system/cpu/cpu0/cpufreq/scaling_governor"
      description: "cpu_governor 命令"
      when_to_use: "按需执行 cpu_governor 场景"
      args: []
      examples: []
      risk: "low"

    # FPGA / PL 专有（Device Tree Overlay + FPGA Manager）
    fpga_mgr_state:
      template: "cat /sys/class/fpga_manager/fpga0/state"
      description: "fpga_mgr_state 命令"
      when_to_use: "按需执行 fpga_mgr_state 场景"
      args: []
      examples: []
      risk: "low"
    fpga_mgr_flags:
      template: "cat /sys/class/fpga_manager/fpga0/flags"
      description: "fpga_mgr_flags 命令"
      when_to_use: "按需执行 fpga_mgr_flags 场景"
      args: []
      examples: []
      risk: "low"
    fpga_mgr_name:
      template: "cat /sys/class/fpga_manager/fpga0/name"
      description: "fpga_mgr_name 命令"
      when_to_use: "按需执行 fpga_mgr_name 场景"
      args: []
      examples: []
      risk: "low"
    fpga_load_bitstream:
      template: "cat {0} > /sys/class/fpga_manager/fpga0/firmware"
      description: "fpga_load_bitstream 命令"
      when_to_use: "按需执行 fpga_load_bitstream 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    # 读取已注册 overlay
    fpga_overlays:
      template: "ls /sys/kernel/config/device-tree/overlays"
      description: "fpga_overlays 命令"
      when_to_use: "按需执行 fpga_overlays 场景"
      args: []
      examples: []
      risk: "low"

    # AXI 外设
    axi_uio_devices:
      template: "ls -l /dev/uio*"
      description: "axi_uio_devices 命令"
      when_to_use: "按需执行 axi_uio_devices 场景"
      args: []
      examples: []
      risk: "low"
    axi_i2c_devices:
      template: "i2cdetect -l"
      description: "axi_i2c_devices 命令"
      when_to_use: "按需执行 axi_i2c_devices 场景"
      args: []
      examples: []
      risk: "low"
    axi_spi_devices:
      template: "ls /dev/spidev*"
      description: "axi_spi_devices 命令"
      when_to_use: "按需执行 axi_spi_devices 场景"
      args: []
      examples: []
      risk: "low"

    # XRT（若是 Alveo/边缘 AI 平台并安装了 XRT）
    xrt_devices:
      template: "xbutil examine"
      description: "xrt_devices 命令"
      when_to_use: "按需执行 xrt_devices 场景"
      args: []
      examples: []
      risk: "low"
    xrt_topology:
      template: "xbutil examine --report platform"
      description: "xrt_topology 命令"
      when_to_use: "按需执行 xrt_topology 场景"
      args: []
      examples: []
      risk: "low"

    # 存储
    storage_devices:
      template: "ls -l /dev/mmcblk* /dev/sd* /dev/nvme*"
      description: "storage_devices 命令"
      when_to_use: "按需执行 storage_devices 场景"
      args: []
      examples: []
      risk: "low"
    mtd_list:
      template: "cat /proc/mtd"
      description: "mtd_list 命令"
      when_to_use: "按需执行 mtd_list 场景"
      args: []
      examples: []
      risk: "low"

    # 网络
    net_ip_addr:
      template: "ip addr"
      description: "net_ip_addr 命令"
      when_to_use: "按需执行 net_ip_addr 场景"
      args: []
      examples: []
      risk: "low"
    net_ip_route:
      template: "ip route"
      description: "net_ip_route 命令"
      when_to_use: "按需执行 net_ip_route 场景"
      args: []
      examples: []
      risk: "low"
    net_stats:
      template: "cat /proc/net/dev"
      description: "net_stats 命令"
      when_to_use: "按需执行 net_stats 场景"
      args: []
      examples: []
      risk: "low"
    eth0_mac:
      template: "cat /sys/class/net/eth0/address"
      description: "eth0_mac 命令"
      when_to_use: "按需执行 eth0_mac 场景"
      args: []
      examples: []
      risk: "low"
    ping_test:
      template: "ping -c 4 {0}"
      description: "ping_test 命令"
      when_to_use: "按需执行 ping_test 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 服务管理
    svc_status:
      template: "systemctl status {0} --no-pager"
      description: "svc_status 命令"
      when_to_use: "按需执行 svc_status 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_start:
      template: "systemctl start {0}"
      description: "svc_start 命令"
      when_to_use: "按需执行 svc_start 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_stop:
      template: "systemctl stop {0}"
      description: "svc_stop 命令"
      when_to_use: "按需执行 svc_stop 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_restart:
      template: "systemctl restart {0}"
      description: "svc_restart 命令"
      when_to_use: "按需执行 svc_restart 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    svc_list:
      template: "systemctl list-units --type=service --no-pager"
      description: "svc_list 命令"
      when_to_use: "按需执行 svc_list 场景"
      args: []
      examples: []
      risk: "low"
    journal_tail:
      template: "journalctl -n {0} --no-pager"
      description: "journal_tail 命令"
      when_to_use: "按需执行 journal_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    journal_svc:
      template: "journalctl -u {0} -n 50 --no-pager"
      description: "journal_svc 命令"
      when_to_use: "按需执行 journal_svc 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 进程
    proc_all:
      template: "ps -ef"
      description: "proc_all 命令"
      when_to_use: "按需执行 proc_all 场景"
      args: []
      examples: []
      risk: "low"
    proc_grep:
      template: "ps -ef | grep {0} | grep -v grep"
      description: "proc_grep 命令"
      when_to_use: "按需执行 proc_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    proc_top:
      template: "top -bn1 | head -20"
      description: "proc_top 命令"
      when_to_use: "按需执行 proc_top 场景"
      args: []
      examples: []
      risk: "low"

    # PetaLinux 常见调试
    petalinux_bootargs:
      template: "cat /proc/cmdline"
      description: "petalinux_bootargs 命令"
      when_to_use: "按需执行 petalinux_bootargs 场景"
      args: []
      examples: []
      risk: "low"
    petalinux_modules:
      template: "lsmod"
      description: "petalinux_modules 命令"
      when_to_use: "按需执行 petalinux_modules 场景"
      args: []
      examples: []
      risk: "low"
    petalinux_dt_nodes:
      template: "find /proc/device-tree -maxdepth 2 -type f | head -n 80"
      description: "petalinux_dt_nodes 命令"
      when_to_use: "按需执行 petalinux_dt_nodes 场景"
      args: []
      examples: []
      risk: "low"
