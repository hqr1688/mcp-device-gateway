      description: "net_dnsmasq_leases 命令"
      when_to_use: "按需执行 net_dnsmasq_leases 场景"
      args: []
      examples: []
      risk: "low"
    net_wifi_status:
      template: "ubus call network.wireless status"
      description: "net_wifi_status 命令"
      when_to_use: "按需执行 net_wifi_status 场景"
      args: []
      examples: []
      risk: "low"
    net_wifi_reload:
