      description: "net_ip_addr 命令"
      when_to_use: "按需执行 net_ip_addr 场景"
      args: []
      examples: []
      risk: "low"
    net_ip_route:
      template: "ip route"
      description: "net_ip_route 命令"
      when_to_use: "按需执行 net_ip_route 场景"
      args: []
      examples: []
      risk: "low"
    net_bridge:
      template: "brctl show"
      description: "net_bridge 命令"
      when_to_use: "按需执行 net_bridge 场景"
      args: []
