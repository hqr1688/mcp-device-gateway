    ping_test:
      template: "ping -c 4 {0}"
      description: "ping_test 命令"
      when_to_use: "按需执行 ping_test 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 防火墙
    fw_status:
      template: "service firewall status"
      description: "fw_status 命令"
      when_to_use: "按需执行 fw_status 场景"
      args: []
      examples: []
