    proc_all:
      template: "ps w"
      description: "proc_all 命令"
      when_to_use: "按需执行 proc_all 场景"
      args: []
      examples: []
      risk: "low"
    proc_grep:
      template: "ps w | grep {0} | grep -v grep"
      description: "proc_grep 命令"
      when_to_use: "按需执行 proc_grep 场景"
