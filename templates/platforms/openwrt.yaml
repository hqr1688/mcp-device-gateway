# OpenWrt 平台命令模板
# 适用场景：路由器、网关、边缘盒子（OpenWrt 21/22/23）
# 典型 SoC：MTK、Qualcomm、Realtek、Broadcom、Amlogic、x86
#
# 使用方法：将以下 command_templates 条目复制到你的 devices.yaml 中

command_templates:

  linux_common:

    # 系统信息
    owrt_release:
      template: "cat /etc/openwrt_release"
      description: "owrt_release 命令"
      when_to_use: "按需执行 owrt_release 场景"
      args: []
      examples: []
      risk: "low"
    owrt_banner:
      template: "cat /etc/banner"
      description: "owrt_banner 命令"
      when_to_use: "按需执行 owrt_banner 场景"
      args: []
      examples: []
      risk: "low"
    sys_uname:
      template: "uname -a"
      description: "sys_uname 命令"
      when_to_use: "按需执行 sys_uname 场景"
      args: []
      examples: []
      risk: "low"
    sys_uptime:
      template: "uptime"
      description: "sys_uptime 命令"
      when_to_use: "按需执行 sys_uptime 场景"
      args: []
      examples: []
      risk: "low"
    sys_mem_usage:
      template: "free"
      description: "sys_mem_usage 命令"
      when_to_use: "按需执行 sys_mem_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_disk_usage:
      template: "df -h"
      description: "sys_disk_usage 命令"
      when_to_use: "按需执行 sys_disk_usage 场景"
      args: []
      examples: []
      risk: "low"
    sys_dmesg_tail:
      template: "dmesg | tail -n {0}"
      description: "sys_dmesg_tail 命令"
      when_to_use: "按需执行 sys_dmesg_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_logread_tail:
      template: "logread | tail -n {0}"
      description: "sys_logread_tail 命令"
      when_to_use: "按需执行 sys_logread_tail 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    sys_logread_grep:
      template: "logread | grep {0}"
      description: "sys_logread_grep 命令"
      when_to_use: "按需执行 sys_logread_grep 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # UCI 配置（OpenWrt 核心）
    uci_show_all:
      template: "uci show"
      description: "uci_show_all 命令"
      when_to_use: "按需执行 uci_show_all 场景"
      args: []
      examples: []
      risk: "low"
    uci_show_pkg:
      template: "uci show {0}"
      description: "uci_show_pkg 命令"
      when_to_use: "按需执行 uci_show_pkg 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    uci_get:
      template: "uci get {0}"
      description: "uci_get 命令"
      when_to_use: "按需执行 uci_get 场景"
      args: ["arg0"]
      examples: []
      risk: "low"
    uci_set:
      template: "uci set {0}={1}"
      description: "uci_set 命令"
      when_to_use: "按需执行 uci_set 场景"
      args: ["arg0", "arg1"]
      examples: []
      risk: "low"
    uci_commit_pkg:
      template: "uci commit {0}"
      description: "uci_commit_pkg 命令"
      when_to_use: "按需执行 uci_commit_pkg 场景"
      args: ["arg0"]
      examples: []
      risk: "low"

    # 网络
    net_ifstatus:
