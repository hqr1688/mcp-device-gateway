devices:
  devkit-dev:
    host: <DEVICE_IP>
    port: 22
    username: <USERNAME>
    os_family: "linux"
    os_name: "Ubuntu"
    os_version: "22.04"
    allow_kernel_module_ops: false
    description: "开发设备示例，用于联调、日志排查和文件传输"
    when_to_use: "需要执行健康检查、查看目录、上传产物或回收日志时"
    capabilities:
      - "shell-command"
      - "log-inspection"
      - "file-transfer"
    tags:
      - "dev"
      - "linux"
      - "arm64"
    preferred_templates:
      - "linux_common.health_check"
      - "linux_common.list_dir"
      - "device_specific.devkit-dev.tail_app_log"
      - "device_specific.devkit-dev.restart_app"
    key_file: null
    password: "<PASSWORD_OR_NULL>"
    known_hosts: null
    allowed_roots:
      - /opt/app/
      - /var/log/app/
      - /tmp/
    denied_paths:
      - /opt/app/.env
      - /opt/app/secret/
      - /var/log/app/archive/

command_templates:
  linux_common:
    health_check:
      template: "uname -a; uptime"
      description: "查看内核与运行时长"
      when_to_use: "连接后快速确认设备状态"
      examples: []
      risk: "low"
    disk_usage:
      template: "df -h"
      description: "查看磁盘使用情况"
      when_to_use: "排查磁盘空间不足"
      examples: []
      risk: "low"
    mem_usage:
      template: "free -m"
      description: "查看内存使用情况"
      when_to_use: "排查内存占用异常"
      examples: []
      risk: "low"
    list_dir:
      template: "ls -al {0}"
      description: "列出指定目录"
      when_to_use: "检查目录结构或确认文件是否存在"
      args: ["path"]
      examples:
        - ["/opt/app/"]
        - ["/var/log/app/"]
      risk: "low"
    read_file:
      template: "cat {0}"
      description: "读取文本文件内容"
      when_to_use: "查看配置、日志或状态文件"
      args: ["path"]
      examples:
        - ["/var/log/app/app.log"]
      risk: "low"

  windows_common:
    list_dir:
      template: "powershell -Command Get-ChildItem -Force {0}"
      description: "列出目录内容（Windows）"
      when_to_use: "目标设备是 Windows 时查看目录"
      args: ["path"]
      examples:
        - ["C:/"]
      risk: "low"

  device_specific:
    devkit-dev:
      tail_app_log:
        template: "tail -n 100 /var/log/app/app.log"
        description: "查看应用日志尾部"
        when_to_use: "排查启动失败或运行期异常"
        examples: []
        risk: "low"
      restart_app:
        template: "systemctl restart app && echo restarted"
        description: "重启示例应用"
        when_to_use: "部署完成后重新拉起服务"
        examples: []
        exec_mode: async
        risk: "medium"
