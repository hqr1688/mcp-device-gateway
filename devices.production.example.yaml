# =============================================================================
# mcp-device-gateway — 生产环境最小授权配置模板
# =============================================================================
# 使用前请将以下占位符替换为真实值：
#
#   <DEVICE_IP>   目标设备 IP 地址或 hostname
#   <USERNAME>    SSH 登录账号（建议使用专用部署账号，而非 root）
#
# --------------------------------------------------------------------------
# 第一步：生成 SSH 密钥对（本机执行，若已有密钥对可跳过）
#   ssh-keygen -t ed25519 -f C:/keys/devkit_id_ed25519
#
# 第二步：将公钥追加到设备受信列表
#   # 在设备上执行：
#   mkdir -p ~/.ssh && cat << 'EOF' >> ~/.ssh/authorized_keys
#   <粘贴 C:/keys/devkit_id_ed25519.pub 的内容>
#   EOF
#   chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
#
# 第三步：采集设备主机指纹，写入本地 known_hosts
#   ssh-keyscan -H <DEVICE_IP> >> C:/keys/known_hosts
#   # 非默认端口时：
#   ssh-keyscan -p <PORT> -H <DEVICE_IP> >> C:/keys/known_hosts
#
# known_hosts 配置后，ssh_client.py 将使用 RejectPolicy：
#   - 指纹匹配 → 连接成功
#   - 指纹不匹配 → 立即拒绝（防止中间人攻击）
#   - 未配置 known_hosts → 使用 AutoAddPolicy（仅建议用于内网开发环境）
# =============================================================================

devices:

  # ---------------------------------------------------------------------------
  # 单设备示例：最小授权，仅开放应用目录与临时目录
  # ---------------------------------------------------------------------------
  devkit-prod:
    host: <DEVICE_IP>
    port: 22
    username: <USERNAME>
    os_family: "linux"
    os_name: "Ubuntu"
    os_version: "22.04"
    description: "生产主设备，负责线上服务运行与运维动作"
    when_to_use: "线上健康检查、服务维护、日志回收"
    capabilities:
      - "shell-command"
      - "service-management"
      - "log-inspection"
      - "file-transfer"
    tags:
      - "prod"
      - "linux"
      - "app"
    preferred_templates:
      - "linux_common.health_check"
      - "linux_common.disk_usage"
      - "linux_common.mem_usage"
      - "device_specific.devkit-prod.service_status"
      - "device_specific.devkit-prod.service_restart"
      - "device_specific.devkit-prod.tail_log"

    # 优先使用密钥认证，生产环境禁止使用明文密码
    key_file: C:/keys/devkit_id_ed25519
    password: null

    # 强制主机指纹校验，见第三步
    known_hosts: C:/keys/known_hosts

    # allowed_roots 仅开放必要目录
    # 重要：若设置为空列表 [] 则不限制路径——生产环境禁止此用法
    allowed_roots:
      - /opt/app/
      - /tmp/

  # ---------------------------------------------------------------------------
  # 多设备示例：为多个目标复用同一 known_hosts
  # ---------------------------------------------------------------------------
  devkit-staging:
    host: <STAGING_IP>
    port: 22
    username: deploy
    os_family: "linux"
    os_name: "Ubuntu"
    os_version: "22.04"
    description: "预发设备，用于发布前验证"
    when_to_use: "发布演练、预发环境问题复现"
    capabilities:
      - "shell-command"
      - "service-management"
      - "log-inspection"
      - "file-transfer"
    tags:
      - "staging"
      - "linux"
      - "app"
    preferred_templates:
      - "linux_common.health_check"
      - "linux_common.disk_usage"
      - "device_specific.devkit-staging.service_status"
      - "device_specific.devkit-staging.tail_log"
    key_file: C:/keys/staging_id_ed25519
    password: null
    known_hosts: C:/keys/known_hosts
    allowed_roots:
      - /opt/app/
      - /var/log/app/
      - /tmp/


# =============================================================================
# 命令模板
# =============================================================================
# 安全规则：
#   - 只声明业务所需的命令，不暴露通用 shell 能力
#   - 参数占位符使用 {0}、{1}（template.format(*args) 展开）
#   - args 在执行前会按正则 ^[a-zA-Z0-9_./:=+\-]+$ 做 fullmatch 校验
#   - 禁止在模板中拼接未经校验的字符串
# =============================================================================

command_templates:
  windows_common:
    # 生产环境一般为 Linux，此处保留 Windows 通用模板以兼容混合环境。
    list_dir:
      template: "powershell -Command Get-ChildItem -Force {0}"
      description: "列出目录内容（Windows）"
      when_to_use: "目标是 Windows 主机时查看目录"
      args: ["path"]
      examples:
        - ["C:/"]
      risk: "low"

  linux_common:
    # --- 健康检查 ---
    health_check: "uname -a; uptime"
    disk_usage: "df -h"
    mem_usage: "free -m"

    # --- 通用目录与进程 ---
    list_dir:
      template: "ls -al {0}"
      description: "列出指定目录"
      when_to_use: "检查目录结构或文件存在性"
      args: ["path"]
      examples:
        - ["/opt/app/"]
        - ["/var/log/app/"]
      risk: "low"
    app_process:
      template: "ps -ef | grep {0} | grep -v grep"
      description: "查看指定进程"
      when_to_use: "检查服务进程是否存在"
      args: ["process_keyword"]
      examples:
        - ["myapp"]
      risk: "low"

  device_specific:
    devkit-prod:
      # --- 服务管理（按需开放，最小化授权）---
      service_status: "systemctl status {0} --no-pager"
      service_restart: "systemctl restart {0}"
      service_stop: "systemctl stop {0}"

      # --- 日志查看 ---
      tail_log: "tail -n {0} /var/log/app/app.log"
      list_log_dir: "ls -al /var/log/app/"

      # --- 应用目录 ---
      list_app_dir: "ls -al /opt/app/"

    devkit-staging:
      service_status: "systemctl status {0} --no-pager"
      service_restart: "systemctl restart {0}"
      service_stop: "systemctl stop {0}"
      tail_log: "tail -n {0} /var/log/app/app.log"
      list_log_dir: "ls -al /var/log/app/"
      list_app_dir: "ls -al /opt/app/"
